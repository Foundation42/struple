name: CI

on:
  push:
  pull_request:

jobs:
  zig:
    name: Zig (reference + corpus)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: mlugg/setup-zig@v2
        with:
          version: 0.14.1
      - name: Unit tests
        run: zig build test
      - name: Corpus is up to date
        run: |
          zig build vectors
          git diff --exit-code conformance/vectors.json conformance/semantic_vectors.json

  typescript:
    name: TypeScript
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
      - run: npm test
        working-directory: js

  python:
    name: Python
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python -m unittest discover -s tests -t .
        working-directory: py

  rust:
    name: Rust
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo test
        working-directory: rust

  c:
    name: C
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: make test
        working-directory: c
      - name: Sanitizers
        run: |
          cc -std=c11 -g -fsanitize=address,undefined -fno-sanitize-recover=all \
            -o tc test_conformance.c struple.c struple_json.c -lm && ./tc
        working-directory: c

  cpp:
    name: C++
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: make test
        working-directory: cpp
      - name: Sanitizers
        run: |
          g++ -std=c++17 -g -fsanitize=address,undefined -fno-sanitize-recover=all \
            -Iinclude -o tc test/test_conformance.cpp && ./tc
        working-directory: cpp

  go:
    name: Go
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.23"
      - run: go test ./...
        working-directory: go
      - name: gofmt
        run: test -z "$(gofmt -l .)"
        working-directory: go

  java:
    name: Java
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
      - run: ./run-tests.sh
        working-directory: java

  kotlin:
    name: Kotlin
    runs-on: ubuntu-latest
    env:
      KOTLIN_VERSION: "2.4.0"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
      - name: Install Kotlin compiler
        run: |
          curl -sL -o /tmp/kotlin.zip \
            "https://github.com/JetBrains/kotlin/releases/download/v${KOTLIN_VERSION}/kotlin-compiler-${KOTLIN_VERSION}.zip"
          unzip -q /tmp/kotlin.zip -d "$HOME/kotlin-dist"
      - name: Test
        run: KOTLINC="$HOME/kotlin-dist/kotlinc/bin/kotlinc" ./run-tests.sh
        working-directory: kotlin

  csharp:
    name: C#
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"
      - run: DOTNET=dotnet ./run-tests.sh
        working-directory: csharp

  dart:
    name: Dart
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dart-lang/setup-dart@v1
        with:
          sdk: stable
      - run: DART=dart ./run-tests.sh
        working-directory: dart

  swift:
    name: Swift
    runs-on: ubuntu-24.04
    env:
      SWIFT_VERSION: "6.3.2"
    steps:
      - uses: actions/checkout@v4
      - name: Install Swift runtime deps
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends libncurses6 libtinfo6 libcurl4
      - name: Install Swift toolchain
        run: |
          url="https://download.swift.org/swift-${SWIFT_VERSION}-release/ubuntu2404/swift-${SWIFT_VERSION}-RELEASE/swift-${SWIFT_VERSION}-RELEASE-ubuntu24.04.tar.gz"
          curl -fsSL -o /tmp/swift.tar.gz "$url"
          mkdir -p "$HOME/swift" && tar xzf /tmp/swift.tar.gz -C "$HOME/swift" --strip-components=1
      - run: ./run-tests.sh
        working-directory: swift
